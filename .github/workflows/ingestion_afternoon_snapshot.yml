name: Afternoon Snapshot Data Ingestion

on:
  workflow_dispatch:

jobs:
  ingest_afternoon_snapshot:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build Go Producer
        working-directory: src/ingestion/fetcher
        run: go build -o producer producer.go

      - name: Run Ingestion
        env:
          REDIS_URL: redis://localhost:6379
          CONSUMER_ID: ${{ secrets.CONSUMER_ID }}
          CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
        run: |
          # Start XSnapshot ingestion
          ./src/ingestion/fetcher/producer -datatype XSnapshot &
          python run.py consumer --datatype XSnapshot &

          wait || true

      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afternoon-snapshot-ingestion-data
          path: ./data/pubsub/
