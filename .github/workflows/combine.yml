name: Combine Data Ingestion

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Afternoon Trade Data Ingestion", "Afternoon Snapshot Data Ingestion"]
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  combine_data:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow

      - name: Download Morning Trade Data
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ingestion_morning_trade.yml
          workflow_conclusion: ""
          name: morning-trade-ingestion-data
          path: ./data/morning

      - name: Download Morning Snapshot Data
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ingestion_morning_snapshot.yml
          workflow_conclusion: ""
          name: morning-snapshot-ingestion-data
          path: ./data/morning

      - name: Download Afternoon Trade Data
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ingestion_afternoon_trade.yml
          workflow_conclusion: ""
          name: afternoon-trade-ingestion-data
          path: ./data/afternoon

      - name: Download Afternoon Snapshot Data
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ingestion_afternoon_snapshot.yml
          workflow_conclusion: ""
          name: afternoon-snapshot-ingestion-data
          path: ./data/afternoon

      - name: Combine Data
        run: |
          python run.py combiner

      - name: Upload Combined Data
        uses: actions/upload-artifact@v4
        with:
          name: combined-ingestion-data
          path: ./data/combined/
