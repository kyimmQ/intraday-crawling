name: Combine Data Ingestion

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Afternoon Data Ingestion"]
    types:
      - completed

jobs:
  combine_data:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow

      - name: Download Morning Ingestion Data
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ingestion_morning.yml
          name: morning-ingestion-data
          path: ./data/morning
          if_no_artifact_found: warn

      - name: Download Afternoon Ingestion Data
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ingestion_afternoon.yml
          name: afternoon-ingestion-data
          path: ./data/afternoon
          if_no_artifact_found: warn

      - name: Combine Data
        run: |
          python src/ingestion/combine.py

      - name: Upload Combined Data
        uses: actions/upload-artifact@v4
        with:
          name: combined-ingestion-data
          path: ./data/combined/
