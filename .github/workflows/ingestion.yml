name: Data Ingestion forever

on:
  workflow_dispatch:

jobs:
  ingest_afternoon:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build Go Producer
        working-directory: src/ingestion
        run: go build -o producer producer.go

      - name: Run Ingestion
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          ./src/ingestion/producer &
          python src/ingestion/consumer.py &

          # Wait for the timeout to finish the processes.
          # The || true catches the timeout exit code so the step turns Green!
          wait || true

      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afternoon-ingestion-data
          path: ./data/pubsub/
